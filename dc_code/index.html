<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQLite Query Tool</title>
  <script src="https://sql.js.org/dist/sql-wasm.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #1e1e2e 0%, #2a2a3e 100%);
      color: #e0e0e0;
      padding: 20px;
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 28px;
      border-bottom: 3px solid #00d4ff;
      padding-bottom: 10px;
      color: #00d4ff;
    }

    .section {
      margin-bottom: 30px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #00d4ff;
    }

    .db-upload {
      margin-bottom: 20px;
      padding: 15px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px dashed #00d4ff;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }

    .db-upload:hover {
      background: rgba(0, 212, 255, 0.1);
      border-color: #00ff88;
    }

    .db-upload input {
      display: none;
    }

    .tables-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 8px;
      margin-bottom: 20px;
    }

    .table-btn {
      padding: 10px 12px;
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .table-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
    }

    .table-btn:active {
      transform: translateY(0);
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 10px;
      background: #1e1e2e;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      resize: vertical;
    }

    textarea:focus {
      outline: none;
      border-color: #00d4ff;
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
    }

    .query-controls {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 8px 16px;
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .results {
      margin-top: 20px;
      max-height: 500px;
      overflow: auto;
      border: 1px solid #444;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.02);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1e1e2e;
    }

    th, td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #333;
    }

    th {
      background: #2a2a3e;
      font-weight: 600;
      color: #00d4ff;
      position: sticky;
      top: 0;
    }

    tr:hover {
      background: rgba(0, 212, 255, 0.05);
    }

    td {
      color: #d0d0d0;
    }

    .error {
      color: #ff6b6b;
      padding: 12px;
      background: rgba(255, 107, 107, 0.1);
      border-radius: 6px;
      margin-top: 10px;
      border-left: 3px solid #ff6b6b;
    }

    .success {
      color: #51cf66;
      padding: 12px;
      background: rgba(81, 207, 102, 0.1);
      border-radius: 6px;
      margin-top: 10px;
      border-left: 3px solid #51cf66;
    }

    .schema-info {
      background: rgba(0, 212, 255, 0.1);
      padding: 12px;
      border-radius: 6px;
      border-left: 3px solid #00d4ff;
      margin-bottom: 15px;
    }

    .schema-table {
      margin-top: 10px;
      font-size: 12px;
    }

    .loading {
      text-align: center;
      padding: 30px;
      opacity: 0.6;
    }

    .spinner {
      border: 3px solid #444;
      border-top: 3px solid #00d4ff;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    @media (max-width: 768px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }
    }

    .file-status {
      padding: 10px;
      background: rgba(81, 207, 102, 0.1);
      border-radius: 6px;
      color: #51cf66;
      font-size: 12px;
      margin-top: 10px;
    }

    .null-value {
      color: #888;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 SQLite Query Tool</h1>

    <div class="section">
      <div class="section-title">📂 데이터베이스 로드</div>
      <div class="db-upload" onclick="document.getElementById('dbInput').click()">
        <input type="file" id="dbInput" accept=".db,.sqlite,.sqlite3" />
        <p>💾 SQLite 데이터베이스 파일을 여기에 드래그하거나 클릭하여 선택</p>
        <small>.db, .sqlite, .sqlite3 파일 지원</small>
        <div class="file-status" id="fileStatus" style="display: none;"></div>
      </div>
    </div>

    <div id="content" style="display: none;">
      <div class="section">
        <div class="section-title">📋 테이블 목록</div>
        <div class="tables-list" id="tablesList">
          <p style="opacity: 0.6;">테이블을 로드할 수 없습니다</p>
        </div>
      </div>

      <div class="section">
        <div class="section-title">✏️ SQL 쿼리</div>
        <textarea id="queryInput" placeholder="SELECT * FROM users LIMIT 10"></textarea>
        <div class="query-controls">
          <button onclick="executeQuery()" id="executeBtn">🚀 실행</button>
          <button onclick="clearQuery()">🗑️ 초기화</button>
          <button onclick="showExamples()">💡 예제</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">📈 결과</div>
        <div id="resultsContainer" style="display: none;">
          <div id="results"></div>
        </div>
        <div id="messageContainer" style="display: none;"></div>
      </div>
    </div>
  </div>

  <script>
    let db = null;
    let SQL = null;

    // sql.js 초기화
    async function initSqlJs() {
      try {
        SQL = await initSqlJs();
        console.log('✓ sql.js 초기화 완료');
      } catch (error) {
        console.error('sql.js 초기화 오류:', error);
      }
    }

    // Page load 시 sql.js 초기화
    window.addEventListener('load', initSqlJs);

    // 파일 선택 핸들러
    document.getElementById('dbInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      try {
        const buffer = await file.arrayBuffer();
        const uint8View = new Uint8Array(buffer);
        db = new SQL.Database(uint8View);
        
        console.log('✓ 데이터베이스 로드 완료');
        document.getElementById('content').style.display = 'block';
        document.getElementById('fileStatus').textContent = `✓ 로드됨: ${file.name}`;
        document.getElementById('fileStatus').style.display = 'block';
        
        loadTablesList();
      } catch (error) {
        const statusDiv = document.getElementById('fileStatus');
        statusDiv.textContent = `❌ 오류: ${error.message}`;
        statusDiv.style.display = 'block';
        statusDiv.style.color = '#ff6b6b';
        statusDiv.style.background = 'rgba(255, 107, 107, 0.1)';
        console.error('데이터베이스 로드 오류:', error);
      }
    });

    function loadTablesList() {
      try {
        const result = db.exec(
          "SELECT name FROM sqlite_master WHERE type='table' AND name NOT LIKE 'sqlite_%' ORDER BY name"
        );
        
        const tables = result.length > 0 ? result[0].values.map(row => row[0]) : [];
        const container = document.getElementById('tablesList');
        
        if (tables.length === 0) {
          container.innerHTML = '<p style="opacity: 0.6;">테이블이 없습니다</p>';
          return;
        }

        container.innerHTML = tables
          .map(
            (table) => 
              `<button class="table-btn" onclick="loadTable('${table}')">📑 ${table}</button>`
          )
          .join('');
      } catch (error) {
        console.error('테이블 목록 조회 오류:', error);
      }
    }

    function loadTable(tableName) {
      document.getElementById('queryInput').value = `SELECT * FROM ${tableName} LIMIT 100`;
      
      try {
        const result = db.exec(`PRAGMA table_info(${tableName})`);
        if (result.length > 0) {
          const schema = result[0].values;
          const container = document.getElementById('messageContainer');
          
          const columnNames = ['Index', 'Column', 'Type', 'Required', 'Default', 'PK'];
          const schemaHtml = schema
            .map(
              (col, idx) => `
              <tr>
                <td>${idx + 1}</td>
                <td><strong>${col[1]}</strong></td>
                <td>${col[2]}</td>
                <td>${col[3] ? '✓' : '-'}</td>
                <td>${col[4] !== null ? col[4] : '-'}</td>
                <td>${col[5] ? '✓' : '-'}</td>
              </tr>
              `
            )
            .join('');

          const html = `
            <div class="schema-info">
              <strong>📋 테이블 스키마 (${tableName})</strong>
              <table class="schema-table">
                <tr>
                  <th>#</th>
                  <th>컬럼</th>
                  <th>타입</th>
                  <th>필수</th>
                  <th>기본값</th>
                  <th>PK</th>
                </tr>
                ${schemaHtml}
              </table>
            </div>
          `;
          container.innerHTML = html;
          container.style.display = 'block';
        }
      } catch (error) {
        console.error('테이블 스키마 조회 오류:', error);
      }
    }

    function executeQuery() {
      if (!db) {
        alert('먼저 데이터베이스를 로드해주세요');
        return;
      }

      const sql = document.getElementById('queryInput').value.trim();
      if (!sql) {
        alert('쿼리를 입력해주세요');
        return;
      }

      const btn = document.getElementById('executeBtn');
      btn.disabled = true;
      btn.textContent = '⏳ 실행 중...';

      try {
        const result = db.exec(sql);
        displayResults(result, sql);
      } catch (error) {
        displayError(error.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '🚀 실행';
      }
    }

    function displayResults(results, sql) {
      const container = document.getElementById('resultsContainer');
      const resultsDiv = document.getElementById('results');

      if (!results || results.length === 0) {
        resultsDiv.innerHTML = `
          <div class="success">
            ✓ 쿼리 실행 성공
            <br>
            <small style="opacity: 0.8;">결과: 0개 행 또는 수정 쿼리 실행</small>
          </div>
        `;
        container.style.display = 'block';
        return;
      }

      const result = results[0];
      const columns = result.columns;
      const rows = result.values;

      const html = `
        <div style="margin-bottom: 10px; padding: 10px; background: rgba(81, 207, 102, 0.1); border-radius: 6px; border-left: 3px solid #51cf66;">
          ✓ 쿼리 실행 성공 (결과: ${rows.length}행)
        </div>
        <div style="overflow-x: auto;">
          <table>
            <thead>
              <tr>
                ${columns.map((col) => `<th>${col}</th>`).join('')}
              </tr>
            </thead>
            <tbody>
              ${rows
                .map(
                  (row) =>
                    `<tr>
                    ${row
                      .map((value) => {
                        return `<td>${
                          value === null
                            ? '<span class="null-value">NULL</span>'
                            : String(value).length > 100 
                              ? String(value).substring(0, 100) + '...'
                              : String(value)
                        }</td>`;
                      })
                      .join('')}
                  </tr>`
                )
                .join('')}
            </tbody>
          </table>
        </div>
      `;
      resultsDiv.innerHTML = html;
      container.style.display = 'block';
    }

    function displayError(errorMsg) {
      const container = document.getElementById('resultsContainer');
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = `<div class="error">❌ 오류: ${errorMsg}</div>`;
      container.style.display = 'block';
    }

    function clearQuery() {
      document.getElementById('queryInput').value = '';
      document.getElementById('resultsContainer').style.display = 'none';
      document.getElementById('messageContainer').style.display = 'none';
    }

    function showExamples() {
      const examples = [
        'SELECT * FROM users;',
        'SELECT * FROM products;',
        'SELECT COUNT(*) as 총개수 FROM users;',
        'SELECT name, email FROM users WHERE age > 25;',
        'SELECT category, COUNT(*) FROM products GROUP BY category;',
        'SELECT * FROM products ORDER BY price DESC;'
      ];

      const selected = examples[Math.floor(Math.random() * examples.length)];
      document.getElementById('queryInput').value = selected;
    }

    // 드래그 앤 드롭 지원
    const dropZone = document.querySelector('.db-upload');
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      dropZone.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
      e.preventDefault();
      e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
      dropZone.addEventListener(eventName, highlight, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
      dropZone.addEventListener(eventName, unhighlight, false);
    });

    function highlight(e) {
      dropZone.style.background = 'rgba(0, 212, 255, 0.15)';
    }

    function unhighlight(e) {
      dropZone.style.background = 'rgba(255, 255, 255, 0.05)';
    }

    dropZone.addEventListener('drop', handleDrop, false);

    function handleDrop(e) {
      const dt = e.dataTransfer;
      const files = dt.files;
      document.getElementById('dbInput').files = files;
      
      const event = new Event('change', { bubbles: true });
      document.getElementById('dbInput').dispatchEvent(event);
    }
  </script>
</body>
</html>
